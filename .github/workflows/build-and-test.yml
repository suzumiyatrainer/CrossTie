name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
      # Optional escape hatch only — the default build resolves everything (including the
      # RTM/KaizPatchX dependency) from public repositories (JitPack, GTNH Maven, etc.),
      # so these secrets are not required for the build to succeed.
      ORG_GRADLE_PROJECT_privateMavenUrl: ${{ secrets.PRIVATE_MAVEN_URL }}
      ORG_GRADLE_PROJECT_privateMavenUser: ${{ secrets.PRIVATE_MAVEN_USER }}
      ORG_GRADLE_PROJECT_privateMavenPassword: ${{ secrets.PRIVATE_MAVEN_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clean Corrupted Gradle Cache Metadata (JSON)
      run: find ${{ github.workspace }}/.gradle-user-home -name "*.json" -type f -delete || true

    - name: Build with Gradle
      run: ./gradlew build --no-daemon --no-configuration-cache
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CrossTie-autobuild-${{ github.sha }}  # コミットごとに名前を分ける
        path: |
          build/libs/*.jar
          !build/libs/*-sources.jar
          !build/libs/*-javadoc.jar