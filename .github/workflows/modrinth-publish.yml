name: Publish to Modrinth

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore dependencies
        run: |
          mkdir -p libs
          unzip -P "${{ secrets.LIBS_PASSWORD }}" libs.zip -d libs

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Select publish artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*-dev.jar' | head -n 1)"
          if [ -z "$jar_path" ]; then
            echo "No publishable JAR found under build/libs" >&2
            exit 1
          fi
          echo "files_json=[\"$jar_path\"]" >> "$GITHUB_OUTPUT"
          echo "Selected artifact: $jar_path"

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: xrwNprGB
          files: ${{ steps.artifact.outputs.files_json }}
          changelog: ${{ github.event.release.body || github.event.release.name || github.event.release.tag_name }}
          name: ${{ github.event.release.name || github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          loaders: forge
          game-versions: 1.7.10
          dependencies: |-
            [{
                "project_id": "ghjoiQAl",
                "dependency_type": "required"
            }]