name: Publish to Modrinth

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (e.g. 1.0.0-Alpha4)"
        required: true
        type: string

env:
  # Node.js 20の非推奨警告への対策
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_privateMavenUrl: ${{ secrets.PRIVATE_MAVEN_URL }}
      ORG_GRADLE_PROJECT_privateMavenUser: ${{ secrets.PRIVATE_MAVEN_USER }}
      ORG_GRADLE_PROJECT_privateMavenPassword: ${{ secrets.PRIVATE_MAVEN_PASSWORD }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
      RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.name || github.event.release.tag_name }}
      RELEASE_CHANGELOG: ${{ github.event_name == 'workflow_dispatch' && format('Manual publish for {0}', inputs.release_tag) || github.event.release.body || github.event.release.name || github.event.release.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: bash ./gradlew build --no-daemon

      - name: Select publish artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          # xargsで前後空白・改行を完全に除去。printfで改行なしの出力を保証
          jar_path=$(find build/libs -maxdepth 1 -type f -name 'CrossTie-*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1 | xargs)

          if [ -z "$jar_path" ]; then
            echo "Error: Main JAR file not found!" >&2
            ls -R build/libs
            exit 1
          fi

          # JSON array avoids empty-line parsing bug in modrinth-publish.
          echo "files_json=[\"$jar_path\"]" >> "$GITHUB_OUTPUT"
          echo "Selected artifact: $jar_path"

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: xrwNprGB
          files: ${{ steps.artifact.outputs.files_json }}
          # 1行の文字列として指定
          loaders: forge
          game-versions: 1.7.10
          channel: release
          # JSONから空白・改行を完全に排除
          dependencies: '[{"project_id":"ghjoiQAl","dependency_type":"required"}]'
          changelog: ${{ env.RELEASE_CHANGELOG }}
          name: ${{ env.RELEASE_NAME }}
          version: ${{ env.RELEASE_TAG }}
