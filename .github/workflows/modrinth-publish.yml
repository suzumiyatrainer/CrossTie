name: Publish to Modrinth

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (e.g. 1.0.0-Alpha4)"
        required: true
        type: string
  
permissions:
  contents: read

env:
  # Node.js 20の非推奨警告への対策
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
      ORG_GRADLE_PROJECT_privateMavenUrl: ${{ secrets.PRIVATE_MAVEN_URL }}
      ORG_GRADLE_PROJECT_privateMavenUser: ${{ secrets.PRIVATE_MAVEN_USER }}
      ORG_GRADLE_PROJECT_privateMavenPassword: ${{ secrets.PRIVATE_MAVEN_PASSWORD }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
      RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.name || github.event.release.tag_name }}
      RELEASE_CHANGELOG: ${{ github.event_name == 'workflow_dispatch' && format('Manual publish for {0}', inputs.release_tag) || github.event.release.body || github.event.release.name || github.event.release.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download existing GitHub release artifact
        if: github.event_name == 'release'
        id: maybe_download
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p build/libs
            response=$(curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPO/releases/tags/$RELEASE_TAG")
            # Extract matching asset name and url using jq (avoid multiline heredoc issues)
            asset_info=$(echo "$response" | jq -r '.assets[] | select(.name | test("CrossTie-.*\\.jar$")) | "\(.name) \(.url)"' | head -n 1 || true)

          if [ -n "$asset_info" ]; then
            asset_name=$(printf '%s' "$asset_info" | awk '{print $1}')
            asset_url=$(printf '%s' "$asset_info" | awk '{print $2}')
            curl -L -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" "$asset_url" -o "build/libs/$asset_name"
            echo "downloaded=true" >> "$GITHUB_OUTPUT"
            echo "artifact_path=build/libs/$asset_name" >> "$GITHUB_OUTPUT"
            echo "artifact_name=$asset_name" >> "$GITHUB_OUTPUT"
            echo "files_json=[\"build/libs/$asset_name\"]" >> "$GITHUB_OUTPUT"
            echo "Selected artifact: build/libs/$asset_name"
          else
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Gradle
        if: steps.maybe_download.outputs.downloaded != 'true'
        run: bash ./gradlew build --no-daemon --no-configuration-cache

      - name: Select publish artifact
        id: artifact
        shell: bash
        env:
          downloaded: ${{ steps.maybe_download.outputs.downloaded }}
          downloaded_path: ${{ steps.maybe_download.outputs.artifact_path }}
          downloaded_name: ${{ steps.maybe_download.outputs.artifact_name }}
        run: |
          set -euo pipefail

          if [ "${downloaded:-false}" = "true" ] && [ -f "${downloaded_path}" ]; then
            artifact_path="$downloaded_path"
            artifact_name="$downloaded_name"
          else
            jar_path=$(find build/libs -maxdepth 1 -type f -name 'CrossTie-*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1 | xargs)

            if [ -z "$jar_path" ]; then
              echo "Error: Main JAR file not found!" >&2
              ls -R build/libs
              exit 1
            fi

            artifact_path="$jar_path"
            artifact_name=$(basename "$jar_path")
          fi

          echo "files_json=[\"$artifact_path\"]" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "Selected artifact: $artifact_path"

      - name: Upload GitHub release asset
        if: github.event_name == 'release' && steps.maybe_download.outputs.downloaded != 'true'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.artifact.outputs.artifact_path }}
          asset_name: ${{ steps.artifact.outputs.artifact_name }}
          asset_content_type: application/java-archive

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: xrwNprGB
          files: ${{ steps.artifact.outputs.files_json }}
          loaders: forge
          game-versions: 1.7.10
          dependencies: '[{"project_id":"ghjoiQAl","dependency_type":"required"}]'
          changelog: ${{ env.RELEASE_CHANGELOG }}
          name: ${{ env.RELEASE_NAME }}
          version: ${{ env.RELEASE_TAG }}
