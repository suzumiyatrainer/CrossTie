name: Publish to Modrinth

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore dependencies
        run: |
          mkdir -p libs
          unzip -P "${{ secrets.LIBS_PASSWORD }}" libs.zip -d libs

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Select publish artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          # 'dev' や 'sources' が含まれないメインのJARのみを探し、改行を完全に除去
          jar_path=$(find build/libs -maxdepth 1 -type f -name 'CrossTie-*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1 | tr -d '\n\r')
          
          if [ -z "$jar_path" ]; then
            echo "Error: Main JAR file not found!" >&2
            exit 1
          fi
          
          echo "jar_path=$jar_path" >> "$GITHUB_OUTPUT"
          echo "Selected artifact: $jar_path"

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: xrwNprGB
          # 配列形式を避け、パスを直接渡します
          files: ${{ steps.artifact.outputs.jar_path }}
          # 明示的にメインファイルとして指定（オプション）
          primary-file: ${{ steps.artifact.outputs.jar_path }}
          changelog: ${{ github.event.release.body || github.event.release.name || github.event.release.tag_name }}
          name: ${{ github.event.release.name || github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          loaders: forge
          game-versions: 1.7.10
          dependencies: |-
            [{
                "project_id": "ghjoiQAl",
                "dependency_type": "required"
            }]