name: Publish to Modrinth

on:
  release:
    types: [published]

env:
  # Node.js 20の非推奨警告への対策
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore dependencies
        run: |
          mkdir -p libs
          unzip -P "${{ secrets.LIBS_PASSWORD }}" libs.zip -d libs

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Select publish artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          # xargsで前後空白・改行を完全に除去。printfで改行なしの出力を保証
          jar_path=$(find build/libs -maxdepth 1 -type f -name 'CrossTie-*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1 | xargs)

          if [ -z "$jar_path" ]; then
            echo "Error: Main JAR file not found!" >&2
            ls -R build/libs
            exit 1
          fi

          # 環境変数にセット（ステップ間での改行混入を防ぐ）
          echo "SELECTED_JAR=$jar_path" >> "$GITHUB_ENV"
          echo "Selected artifact: $jar_path"

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: xrwNprGB
          # 環境変数から直接参照することで、展開時の改行混入を回避
          files: ${{ env.SELECTED_JAR }}
          # 1行の文字列として指定
          loaders: forge
          game-versions: 1.7.10
          channel: release
          # JSONから空白・改行を完全に排除
          dependencies: '[{"project_id":"ghjoiQAl","dependency_type":"required"}]'
          # 動的変数の展開。これらはアクション側で1行として処理される
          changelog: ${{ github.event.release.body || github.event.release.name || github.event.release.tag_name }}
          name: ${{ github.event.release.name || github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
